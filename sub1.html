<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백소정</title>
    <style>
        @font-face {
            font-family: 'Aggravo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Aggravo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Aggravo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-1Thin.woff') format('woff');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-2ExtraLight.woff') format('woff');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-3Light.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-4Regular.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-5Medium.woff') format('woff');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-6Bold.woff') format('woff');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-7ExtraBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-8Heavy.woff') format('woff');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Escoredream';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-9Black.woff') format('woff');
            font-weight: 900;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;

        }

        header h1 {
            font-family: 'aggravo';
            text-align: center;
            padding: 20px;
            color: #2E5A44;
        }

        .text {
            font-family: 'Escoredream';
            text-align: center;
            padding: 20px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px;
        }

        .line1,
        .line2 {
            display: flex;
            flex-direction: row;
            justify-content: center;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 25%;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            transition: all 0.2s ease;
            background-color: #F0F5F1;
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;

            margin-bottom: 10px;
            border-radius: 6px;
        }

        .card h3 {
            font-family: 'Escoredream';
            margin-bottom: 6px;
        }

        .card p {
            font-family: 'Escoredream';
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            백소정
        </h1>
    </header>
    <main>
        <div class="text">
            <p>"백 번을 와도 정성스럽고 푸짐한 음식에 감동하는 곳, 백소정입니다. <br>
                매일 아침 엄선된 신선한 재료로 정성을 다해 음식을 준비하며, 남녀노소 누구나 맛있게 즐길 수 있는 정통 일식 돈카츠와 소바 전문점입니다."</p>
        </div>
        <div class="menu">
            <div class="line1">
                <div class="card">
                    <img src="./img/마제소바+돈카츠.jpg" alt="마제소바+돈카츠">
                    <h3>마제소바+돈카츠</h3>
                    <p>16,500</p>
                </div>

                <div class="card">
                    <img src="./img/돈카츠(로스카츠).jpg" alt="돈카츠(로스카츠)">
                    <h3>돈카츠(로스카츠)</h3>
                    <p>12,500</p>
                </div>

                <div class="card">
                    <img src="./img/모짜렐라 치즈카츠.jpg" alt="모짜렐라 치즈카츠">
                    <h3>모짜렐라 치즈카츠</h3>
                    <p>15,000</p>
                </div>
            </div>

            <div class="line2">
                <div class="card">
                    <img src="./img/치즈 모듬카츠.jpg" alt="치즈 모듬카츠">
                    <h3>치즈 모듬카츠</h3>
                    <p>16,500</p>
                </div>

                <div class="card">
                    <img src="./img/에비텐 모듬카츠.jpg" alt="에비텐 모듬카츠">
                    <h3>에비텐 모듬카츠</h3>
                    <p>16,500</p>
                </div>

                <div class="card">
                    <img src="./img/냉소바+돈카츠.jpg" alt="냉소바+돈카츠">
                    <h3>냉소바+돈카츠</h3>
                    <p>16,500</p>
                </div>
            </div>

        </div>
    </main>
    <footer></footer>

</body>

</html>
